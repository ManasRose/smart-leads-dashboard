version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo-dev
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: smart-leads-backend-dev
    restart: unless-stopped
    ports:
      - '5000:5000'
    volumes:
      - ./backend/src:/app/src
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/smart-leads
      JWT_SECRET: dev_secret_key
      JWT_EXPIRES_IN: 7d
      ALLOWED_ORIGINS: http://localhost:3000
    command: npm run dev
    depends_on:
      - mongo
    networks:
      - app-network

volumes:
  mongo_dev_data:

networks:
  app-network:
    driver: bridge
